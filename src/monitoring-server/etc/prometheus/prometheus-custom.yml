global:
        scrape_interval: 15s

rule_files:
        - "alert.rules.yml"

scrape_configs:
        - job_name: "prometheus"
          static_configs:
                  - targets: ['localhost:9090']

        - job_name: "node_exporter"
          static_configs:
                  - targets: ['10.128.0.15:9100', '10.128.0.7:9100']

        - job_name: "openvpn_exporter"
          static_configs:
                  - targets: ['10.128.0.7:9176']
